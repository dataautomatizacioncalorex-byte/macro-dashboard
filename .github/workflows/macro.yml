name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          # Usamos el token por defecto de GitHub para evitar errores de permisos externos
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: python macro_pipeline.py

      - name: Guardar Cambios Automáticamente
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update Macro Data"
          file_pattern: 'Macro_Master_Historico.xlsx'
