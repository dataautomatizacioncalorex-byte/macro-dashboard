name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: python macro_pipeline.py

      - name: Guardar Excel Automáticamente
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Macro Data: $(date +'%Y-%m-%d')"
          file_pattern: 'Macro_Master_Historico.xlsx'
          status_options: '--untracked-files=no'
          skip_dirty_check: false
