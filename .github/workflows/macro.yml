name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'  # 8 AM México aprox
  workflow_dispatch:      # Permite que tú le piques al botón para correrlo manualmente

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }} # Usa el Token que configuramos

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: |
          python macro_pipeline.py

      - name: Guardar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sincronizamos con el servidor para evitar conflictos de versiones
          git pull origin main --rebase
          
          # Agregamos el archivo Master que se generó o actualizó
          git add Macro_Master_Historico.xlsx
          
          # Guardamos los cambios con la fecha de hoy
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "Sin cambios nuevos"
          
          # Subimos todo a tu repositorio
          git push origin main
