name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: python macro_pipeline.py

      - name: Guardar en Rama Nueva
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: $(date +'%Y-%m-%d')"
          file_pattern: 'Macro_Master_Historico.xlsx'
          # ESTO ES LO NUEVO: Crea una rama distinta para que no lo bloqueen
          branch: actualizacion-datos
          push_options: '--force'
          create_branch: true
