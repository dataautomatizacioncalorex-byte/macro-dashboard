name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'  # 8 AM México aprox
  workflow_dispatch:      # Ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }}
          fetch-depth: 0 # IMPORTANTE: Descarga todo el historial

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: |
          python macro_pipeline.py

      - name: Guardar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Nos aseguramos de estar en la rama correcta y traer lo último
          git checkout main
          git pull origin main --rebase
          
          # 2. Agregamos el archivo generado
          git add Macro_Master_Historico.xlsx
          
          # 3. Guardamos el cambio (si no hay cambios, no falla)
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "No hay cambios para guardar"
          
          # 4. Empujamos los cambios
          git push origin main
