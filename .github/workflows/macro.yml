name: Run Macro Pipeline
on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Librerias
        run: pip install pandas yfinance requests openpyxl lxml
        
      - name: Ejecutar
        run: python macro_pipeline.py
        
      - name: Subir
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Macro_Master_Historico.xlsx
          git commit -m "Update" || echo "Sin cambios"
          git push origin main
