name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: python macro_pipeline.py

      - name: Guardar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Forzamos la descarga de la rama main para que no haya dudas
          git fetch origin main
          git checkout main
          
          # 2. Agregamos el archivo
          git add Macro_Master_Historico.xlsx
          
          # 3. Hacemos el commit. Si no hay cambios, no pasa nada.
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: $(date +'%Y-%m-%d')"
            # 4. El PUSH FORZADO es la clave aquí
            git push origin main --force
          else
            echo "Sin cambios detectados en el Excel."
          fi
