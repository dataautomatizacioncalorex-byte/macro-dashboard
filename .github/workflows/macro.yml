name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }}
          fetch-depth: 0 # Descarga toda la historia para evitar conflictos

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: python macro_pipeline.py

      - name: Guardar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # FORZAMOS LA ACTUALIZACIÓN
          git add Macro_Master_Historico.xlsx
          
          # Si hay algo que guardar, lo hacemos a la fuerza
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: $(date +'%Y-%m-%d')"
            git push origin main --force
          else
            echo "Sin cambios nuevos."
          fi
