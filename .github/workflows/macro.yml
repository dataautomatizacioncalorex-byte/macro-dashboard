- name: Save and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Bajamos lo que hay en la nube y mezclamos con lo nuevo
          git pull origin main --rebase
          
          # 2. Agregamos el Excel generado por el script
          git add Macro_Master_Historico.xlsx
          
          # 3. Guardamos el cambio
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          
          # 4. Subimos de forma normal
          git push origin main
