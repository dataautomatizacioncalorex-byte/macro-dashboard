name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'  # 8 AM México aprox
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 🔥 ACTUALIZADO

      - name: Set up Python
        uses: actions/setup-python@v5   # 🔥 ACTUALIZADO
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        run: |
          python macro_pipeline.py
