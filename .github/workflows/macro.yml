name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }} # USA TU TOKEN PERSONAL

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install -r requirements.txt

      - name: Ejecutar script
        run: |
          python macro_pipeline.py

      - name: Guardar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Macro_Master_Historico.xlsx
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push origin main
