name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'  # 8 AM México aprox
  workflow_dispatch:      # Botón manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MI_TOKEN_SECRETO }}
          fetch-depth: 0 # Descarga todo el historial para evitar errores de push

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: |
          python macro_pipeline.py

      - name: Guardar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sincronizamos forzosamente con la nube
          git fetch origin main
          git checkout main
          
          # Agregamos el archivo generado
          git add Macro_Master_Historico.xlsx
          
          # Commit si hay cambios
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          
          # PUSH FORZADO para que no salga el error rojo de conflicto
          git push origin main --force
