- name: Save and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Aseguramos que tenemos lo último
          git fetch origin main
          
          # 2. Agregamos el archivo
          git add Macro_Master_Historico.xlsx
          
          # 3. Intentamos commit
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "No hay cambios"
          
          # 4. PUSH CON FUERZA (Esto rompe el ciclo de errores)
          git push origin main --force
