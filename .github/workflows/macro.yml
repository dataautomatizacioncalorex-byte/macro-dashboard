name: Run Macro Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install pandas yfinance requests openpyxl lxml

      - name: Ejecutar script
        run: python macro_pipeline.py

      - name: Guardar y Forzar Subida
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Agregamos el archivo
          git add Macro_Master_Historico.xlsx
          
          # Intentamos hacer el commit
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || echo "Sin cambios"
          
          # EL TRUCO: Forzamos la subida ignorando conflictos
          git push origin main --force
